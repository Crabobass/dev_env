name: ${PROJECT_NAME}

services:
  server:
    build:
      context: .
      dockerfile: ./conf/server/Dockerfile
    container_name: ${PROJECT_NAME}_server
    restart: unless-stopped
    ports:
      - ${APP_PORT}:80
      - "63343:80" # для swagger
    volumes:
      - ./app:/var/www/html
      - ./conf/server/000-default.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ./conf/server/php.ini:/usr/local/etc/php/php.ini:ro
      - ./conf/server/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:ro
      - ./logs/server/apache:/var/log/apache2
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - DB_HOST=database
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - app_network
    depends_on:
      - db

  db:
    image: mariadb:10.4.29
    container_name: ${PROJECT_NAME}_db
    restart: unless-stopped
    ports:
      - ${DB_PORT}:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
      - ./conf/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - app_network

volumes:
  db_data:
    driver: local

networks:
  app_network:
    name: ${PROJECT_NAME}_net
    driver: bridge

